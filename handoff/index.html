<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Typhoon · Homepage Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #060403; color: #f2e6cf; font-family: system-ui, sans-serif; }
  iframe { border: 0; display: block; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas title="Typhoon — Homepage" subtitle="Desktop & Mobile · matched to mockups · custom audio player · 8 members · 6 demos">
      <DCSection id="homepage" title="Homepage">
        <DCArtboard id="desktop" label="Desktop · 1440 × 2400" width={1440} height={2400}>
          <iframe src="desktop.html" width="1440" height="2400" />
        </DCArtboard>
        <DCArtboard id="mobile" label="Mobile · 390 × 2200" width={390} height={2200}>
          <iframe src="mobile.html" width="390" height="2200" />
        </DCArtboard>
        <DCArtboard id="reference-desktop" label="Reference · Desktop mockup" width={733} height={471}>
          <img src="assets/typhoon-mockup-desktop.png" style={{display:'block', width:'100%', height:'100%', objectFit:'cover'}} alt="" />
        </DCArtboard>
        <DCArtboard id="reference-mobile" label="Reference · Mobile mockup" width={563} height={1000}>
          <img src="assets/typhoon-mockup-mobile.jpeg" style={{display:'block', width:'100%', height:'100%', objectFit:'cover'}} alt="" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
